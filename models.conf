#
# Format:  name:size
# Lines starting with # are ignored.
#
# Model size guide (approximate download / RAM usage):
#   7-8B   models  ~  4-5 GB  — fast, good for quick tasks
#   13-14B models  ~  8-10 GB — balanced speed and quality
#   32B+   models  ~ 18-20 GB — slower but smarter, needs lots of RAM
#
# Tip: Start with one model. You can always add more later.

# — Code generation (deep tasks, chat panel in VS Code Continue)
qwen2.5-coder:14b

# — Autocomplete (fast token gen, tab completion in VS Code Continue)
qwen2.5-coder:7b

# — General chat / reasoning / multimodal (Flowise agents, general assistant)
# gemma4:e4b = 9.6GB, 128K context, text+image+audio, best for agentic use
gemma4:e4b

# — Vision-language (image understanding in WebUI chat)
# llava:7b = ~4.5GB, plain RoPE so no mRoPE bug in current Ollama build
llava:7b
